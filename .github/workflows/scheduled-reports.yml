name: Scheduled Reports

on:
  schedule:
    # Run every 2 hours at 23:25 IST (17:55 UTC)
    # IST = UTC + 5:30
    # 23:25 IST = 17:55 UTC
    # 01:25 IST = 19:55 UTC
    # 03:25 IST = 21:55 UTC
    # 05:25 IST = 23:55 UTC
    # 07:25 IST = 01:55 UTC
    # 09:25 IST = 03:55 UTC
    # 11:25 IST = 05:55 UTC
    # 13:25 IST = 07:55 UTC
    # 15:25 IST = 09:55 UTC
    # 17:25 IST = 11:55 UTC
    # 19:25 IST = 13:55 UTC
    # 21:25 IST = 15:55 UTC
    # GitHub Actions cron format: minute hour day month day-of-week
    - cron: '55 17,19,21,23,1,3,5,7,9,11,13,15 * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual trigger'

jobs:
  generate-report:
    runs-on: ubuntu-latest
    name: Generate Product Insights Report
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      - name: Trigger Report Generation
        env:
          API_ENDPOINT: ${{ secrets.API_ENDPOINT }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
        run: |
          echo "Triggering scheduled report generation..."
          echo "API Endpoint: $API_ENDPOINT"
          
          # Fixed parameters as per configuration
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${API_ENDPOINT}/api/triggers/scheduled" \
            -H "Authorization: Bearer ${API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{
              "weeks": 9,
              "reviews_count": 1000,
              "role": "Product",
              "recipient_name": "Nihal",
              "recipient_email": "nihalreddyb1997@gmail.com",
              "mode": "email",
              "type": "Scheduler"
            }')
          
          # Extract HTTP status code (last line)
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          # Extract response body (all lines except last)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          echo "Response Body: $BODY"
          echo "HTTP Status: $HTTP_CODE"
          
          if [ "$HTTP_CODE" -eq 200 ] || [ "$HTTP_CODE" -eq 202 ]; then
            echo "✅ Report generation triggered successfully"
            exit 0
          else
            echo "❌ Failed to trigger report generation"
            echo "Status Code: $HTTP_CODE"
            exit 1
          fi
      
      - name: Log trigger result
        if: always()
        run: |
          echo "Workflow completed at $(date)"
          echo "Trigger Type: ${{ github.event_name }}"
          echo "Triggered by: ${{ github.actor }}"
